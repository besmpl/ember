name: AI PR review gate

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: ai-pr-review-gate-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  triage:
    name: Triage CI result
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_review: ${{ steps.context.outputs.should_review }}
      should_mark_failed: ${{ steps.context.outputs.should_mark_failed }}
      pr_number: ${{ steps.context.outputs.pr_number }}
      ci_conclusion: ${{ steps.context.outputs.ci_conclusion }}
      final_message: ${{ steps.codex.outputs.final-message }}
    env:
      HAS_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build PR context
        id: context
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const run = context.payload.workflow_run;
            const associated = run.pull_requests || [];
            let pr = associated[0];

            if (!pr) {
              const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: run.head_sha
              });
              pr = response.data[0];
            }

            if (!pr) {
              core.setOutput("should_review", "false");
              core.setOutput("should_mark_failed", "false");
              core.info("Skipping: no pull request associated with workflow run.");
              return;
            }

            const { data: fullPr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            const trusted = new Set(["OWNER", "MEMBER", "COLLABORATOR"]);
            const sameRepo = fullPr.head.repo && fullPr.head.repo.full_name === fullPr.base.repo.full_name;
            const trustedAuthor = trusted.has(fullPr.author_association);
            const open = fullPr.state === "open";
            const ciPassed = run.conclusion === "success";
            const shouldReview = open && sameRepo && trustedAuthor && ciPassed;
            const shouldMarkFailed = open && sameRepo && trustedAuthor && !ciPassed;

            core.setOutput("should_review", String(shouldReview));
            core.setOutput("should_mark_failed", String(shouldMarkFailed));
            core.setOutput("pr_number", String(fullPr.number));
            core.setOutput("ci_conclusion", run.conclusion || "unknown");

            if (!shouldReview) {
              core.info(`Skipping Codex review: open=${open} sameRepo=${sameRepo} trustedAuthor=${trustedAuthor} ciPassed=${ciPassed}`);
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: fullPr.number,
              per_page: 100
            });

            let patchBudget = 60000;
            const changedFiles = files.slice(0, 100).map((file) => {
              const patch = file.patch || "";
              const allowed = Math.max(0, Math.min(patch.length, patchBudget));
              patchBudget -= allowed;
              return {
                filename: file.filename,
                status: file.status,
                additions: file.additions,
                deletions: file.deletions,
                changes: file.changes,
                patch: patch.slice(0, allowed)
              };
            });

            fs.mkdirSync(".github/ai-workflow", { recursive: true });
            fs.writeFileSync(".github/ai-workflow/pr-context.json", JSON.stringify({
              ci: {
                workflow: run.name,
                conclusion: run.conclusion,
                head_sha: run.head_sha,
                url: run.html_url
              },
              pull_request: {
                number: fullPr.number,
                title: fullPr.title,
                body: fullPr.body || "",
                author: fullPr.user.login,
                author_association: fullPr.author_association,
                base_ref: fullPr.base.ref,
                head_ref: fullPr.head.ref,
                head_sha: fullPr.head.sha,
                url: fullPr.html_url,
                labels: fullPr.labels.map((label) => label.name)
              },
              changed_files: changedFiles,
              truncated: files.length > changedFiles.length || patchBudget <= 0
            }, null, 2));

      - name: Check OpenAI key
        if: steps.context.outputs.should_review == 'true' && env.HAS_OPENAI_API_KEY != 'true'
        run: |
          echo "::error::Set repository secret OPENAI_API_KEY before using AI PR review gate."
          exit 1

      - name: Run Codex review
        id: codex
        if: steps.context.outputs.should_review == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/pr-review-gate.md
          output-file: codex-pr-review-decision.json
          codex-args: '["--output-schema", ".github/codex/schemas/pr-review-decision.schema.json"]'
          sandbox: read-only
          safety-strategy: drop-sudo

  apply_ci_failure:
    name: Label CI failure
    runs-on: ubuntu-latest
    needs: triage
    if: needs.triage.outputs.should_mark_failed == 'true'
    permissions:
      issues: write

    steps:
      - name: Add needs-ai-fix
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.triage.outputs.pr_number }}
          CI_CONCLUSION: ${{ needs.triage.outputs.ci_conclusion }}
        with:
          script: |
            const issue_number = Number(process.env.PR_NUMBER);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: ["needs-ai-fix"]
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              name: "ready-for-human"
            }).catch((error) => {
              if (error.status !== 404) throw error;
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: `<!-- ai-pr-review-gate -->\n### AI PR gate: needs fix\n\nCI concluded with ${process.env.CI_CONCLUSION}. Cursor should fix the branch and push again.`
            });

  apply_review:
    name: Apply PR review labels
    runs-on: ubuntu-latest
    needs: triage
    if: needs.triage.outputs.should_review == 'true'
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Apply Codex review decision
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.triage.outputs.final_message }}
          PR_NUMBER: ${{ needs.triage.outputs.pr_number }}
        with:
          script: |
            const issue_number = Number(process.env.PR_NUMBER);
            const raw = (process.env.CODEX_FINAL_MESSAGE || "").trim();

            function parseDecision(text) {
              try {
                return JSON.parse(text);
              } catch (_) {
                const fenced = text.match(/```(?:json)?\s*([\s\S]*?)```/i);
                if (fenced) return JSON.parse(fenced[1]);
                const object = text.match(/\{[\s\S]*\}/);
                if (object) return JSON.parse(object[0]);
                throw new Error("Codex did not return parseable JSON.");
              }
            }

            const decision = parseDecision(raw);
            const verdict = String(decision.verdict || "").toUpperCase();
            const findings = Array.isArray(decision.findings) ? decision.findings : [];
            const actions = Array.isArray(decision.required_actions) ? decision.required_actions : [];
            const findingLines = findings.map((finding) => {
              const location = finding.file ? `${finding.file}${finding.line ? `:${finding.line}` : ""}` : "general";
              return `- [${finding.severity || "medium"}] ${location}: ${finding.message}`;
            });
            const actionLines = actions.map((item) => `- ${item}`);
            const body = [
              "<!-- ai-pr-review-gate -->",
              `### AI PR gate: ${verdict === "PASS" ? "ready for human" : "needs fix"}`,
              "",
              decision.summary || "",
              "",
              findingLines.length ? ["Findings:", ...findingLines].join("\n") : "",
              actionLines.length ? ["Required actions:", ...actionLines].join("\n") : ""
            ].filter(Boolean).join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });

            if (verdict === "PASS") {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                labels: ["ready-for-human"]
              });
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                name: "needs-ai-fix"
              }).catch((error) => {
                if (error.status !== 404) throw error;
              });
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: ["needs-ai-fix"]
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              name: "ready-for-human"
            }).catch((error) => {
              if (error.status !== 404) throw error;
            });
